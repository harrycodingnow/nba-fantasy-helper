name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ingestion deps
        run: pip install -r ingestion/requirements.txt

      - name: Verify committed data snapshot
        # Site is built from committed web/public/data/*.json. Refresh those
        # locally with `python -m ingestion.run` and commit before pushing.
        # CI deliberately does NOT regenerate to avoid clobbering live data
        # with the offline sample (which is stale by design).
        run: |
          test -s web/public/data/players.json
          test -s web/public/data/opportunities.json
          test -s web/public/data/snapshot.json
          python -c "import json; s=json.load(open('web/public/data/snapshot.json')); print('snapshot:', s.get('source_mode'), s.get('generated_at'), 'players=', s['counts']['players'])"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Build static site
        working-directory: web
        env:
          NEXT_PUBLIC_BASE_PATH: /nba-fantasy-helper
        run: npm run build

      - name: Add .nojekyll
        run: touch web/out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
